# NOBLE Ablation: NOBLE on attention projections only (Wqkv + Wo), rank=64
# Hypothesis: attention projections are purely linear, so NOBLE adds unique
# nonlinearity there. FFN already has SwiGLU nonlinearity, so NOBLE may be
# redundant on FFN. This cuts NOBLE overhead by ~50%.
# Params overhead: +5.4% (vs +11.9% for all projections)
#
# Usage: nanoplm pretrain from-yaml pretrain_noble_r64_attn.yaml --pure-torch

pure_torch: true

model:
  hidden_size: 768
  intermediate_size: 1536
  num_hidden_layers: 12
  num_attention_heads: 8
  vocab_size: 32
  mlp_activation: "swiglu"
  mlp_dropout: 0.0
  mlp_bias: false
  no_mlp_on_first_layer: false
  attention_bias: false
  attention_dropout: 0.0
  classifier_activation: "gelu"
  # NOBLE — attention projections only
  use_noble: true
  noble_rank: 64
  noble_alpha: 0.01
  noble_half_kaiming: true
  noble_targets: "attn"
  activation_checkpointing: false
  activation_checkpointing_mode: "attn"

pretraining:
  dataset_dir: "output/data/pretrain_data"
  ckp_dir: "output/noble_ablation/noble_r64_attn"
  micro_batch_size: 64
  global_batch_size: 256000
  num_epochs: 40
  optimizer: "normuon"
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_epsilon: 1e-8
  adam_learning_rate: 1e-4
  max_grad_norm: .inf
  warmup_steps: 50
  lr_decay_to_fraction: 0.1
  lr_schedule: "cosine"
  adam_weight_decay: 0.0
  muon_learning_rate: 1e-3
  muon_weight_decay: 0.01
  muon_cautious_weight_decay: true
  muon_use_polar_express: true
  muon_momentum: 0.95
  muon_nesterov: true
  muon_eps: 1e-7
  # NOBLE LR scaling
  noble_base_lr: 3e-4
  noble_lr_gamma: 0.3
  noble_lr_gamma_M: 0.45
  noble_freq_lr_mult: 3.0
  noble_phase_lr_mult: 5.0
  # MLM
  mlm_probability: 0.3
  mask_replace_prob: 0.8
  random_token_prob: 0.1
  keep_probability: 0.1
  logging_steps: 1
  eval_steps: 50
  save_steps: 5000
  seed: 42
  num_workers: "auto"
  prefetch_factor: 2
  use_packing: true
  use_static_inp_size: true
  use_compile_max_autotune: true
  bf16: true
  tf32: true
  multi_gpu: true
  distributed_mode: "fsdp"
  fsdp_shard_granularity: "layer"
  world_size: 'auto'
  ddp_bucket_cap_mb: 25
  project_name: "noble-ablation"

resume:
  is_resume: false
  checkpoint_dir: "output/pretraining_checkpoints/run-1/checkpoint-1"
